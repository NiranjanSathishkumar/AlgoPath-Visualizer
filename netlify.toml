# ─────────────────────────────────────────────
#  Netlify Configuration — AlgoPath Visualizer Frontend
# ─────────────────────────────────────────────
[build]
  # No build step needed — these are pure static assets
  publish = "src/main/resources/static"

# Redirect all routes to index.html (SPA-style, in case deep links are used)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
