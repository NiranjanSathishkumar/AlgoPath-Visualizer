services:
  - type: web
    name: algopath-visualizer-api
    runtime: docker
    plan: free
    # Render auto-sets PORT; Spring Boot reads it from application.properties
    envVars:
      - key: PORT
        value: 8080
      # Optional: restrict CORS to your Netlify URL after first deploy
      # - key: ALLOWED_ORIGIN
      #   value: https://your-site.netlify.app
    healthCheckPath: /maze/state
    autoDeploy: true
