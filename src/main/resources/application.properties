# ─────────────────────────────────────────────
#  Server Configuration
# ─────────────────────────────────────────────
# Port is read from the PORT environment variable (set automatically by Render/Railway).
# Falls back to 8080 for local development.
server.port=${PORT:8080}

# ─────────────────────────────────────────────
#  Application Info
# ─────────────────────────────────────────────
spring.application.name=algopath-visualizer

# ─────────────────────────────────────────────
#  Logging — avoid blocking output on cloud
# ─────────────────────────────────────────────
logging.level.root=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
